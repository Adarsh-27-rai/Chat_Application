spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/chatapp}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

server:
  port: ${PORT:8080}
  address: 0.0.0.0

jwt:
  secret: ${JWT_SECRET:6D5A7134743777217A25432A462D4A614E645267556B58703273357638792F42}
  expiration-ms: 86400000   # 24 hours

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

upload:
  dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    com.chatapp: DEBUG
    org.springframework.web.socket: DEBUG
